<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KohakuTerrarium — setting up</title>
  <style>
    :root { color-scheme: light dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1f2937, #111827);
      color: #e5e7eb;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px;
      font-weight: 600;
    }
    p.phase {
      font-size: 13px;
      opacity: 0.7;
      margin: 0 0 18px;
      min-height: 16px;
    }
    .bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: #60a5fa;
      transition: width 240ms ease;
    }
    p.message {
      font-size: 11px;
      opacity: 0.55;
      margin: 14px 0 0;
      min-height: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      text-align: center;
      word-break: break-word;
    }
    .done {
      color: #34d399;
    }
    .failed {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>KohakuTerrarium</h1>
    <p class="phase" id="phase">Starting…</p>
    <div class="bar"><div class="bar-fill" id="bar"></div></div>
    <p class="message" id="message"></p>
  </div>
  <script>
    // SPLASH_ENDPOINT is injected by splash_window.py before the page loads.
    const endpoint = window.SPLASH_ENDPOINT || "http://127.0.0.1:0/progress";
    let lastSeq = -1;
    async function poll() {
      try {
        const r = await fetch(endpoint + "?since=" + lastSeq, { cache: "no-store" });
        if (!r.ok) {
          setTimeout(poll, 600);
          return;
        }
        const frame = await r.json();
        if (typeof frame.seq === "number") lastSeq = frame.seq;
        if (typeof frame.phase === "string") {
          document.getElementById("phase").textContent = frame.phase;
        }
        if (typeof frame.percent === "number") {
          document.getElementById("bar").style.width = Math.max(0, Math.min(100, frame.percent)) + "%";
        }
        if (typeof frame.message === "string") {
          document.getElementById("message").textContent = frame.message;
        }
        if (frame.status === "ok" || frame.status === "failed") {
          const el = document.getElementById("phase");
          el.classList.add(frame.status === "ok" ? "done" : "failed");
          return;  // stop polling — caller will close the window
        }
        setTimeout(poll, 250);
      } catch (e) {
        setTimeout(poll, 800);
      }
    }
    poll();
  </script>
</body>
</html>
