# Brainstorm Creature
# Receives a seed prompt, generates creative story ideas, sends to planner.

name: brainstorm
version: "1.0"

controller:
  model: "${OPENROUTER_MODEL:google/gemini-3-flash-preview}"
  temperature: 0.9
  max_tokens: 8192
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  tool_format: native

system_prompt_file: prompts/system.md

input:
  type: none

output:
  type: stdout

tools:
  - name: send_message
    type: builtin
  - name: think
    type: builtin

termination:
  max_turns: 10
  keywords: ["BRAINSTORM_COMPLETE"]
