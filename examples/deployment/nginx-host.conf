# nginx reverse-proxy template for a KohakuTerrarium host.
#
# Place at /etc/nginx/sites-available/kt.example.com.conf and link
# into /etc/nginx/sites-enabled/. Issue TLS via certbot first:
#
#   sudo certbot --nginx -d kt.example.com
#
# Upstream containers (compose-distributed-host.yml) bind to
# 127.0.0.1:8001 (HTTP+WS) and 127.0.0.1:8100 (Lab WS). nginx
# terminates TLS and proxies both.

upstream kt_http { server 127.0.0.1:8001; }
upstream kt_lab  { server 127.0.0.1:8100; }

# Redirect plain http -> https
server {
    listen 80;
    server_name kt.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kt.example.com;

    ssl_certificate     /etc/letsencrypt/live/kt.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kt.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend + API + chat WS (paths: /, /api/..., /ws/...)
    location / {
        proxy_pass http://kt_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived WS for chat streaming
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Lab WebSocket (workers connect here as wss://kt.example.com/lab)
    location = /lab {
        proxy_pass http://kt_lab/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Optional: gzip text responses (HTTP API). NOT on WS / streaming.
    gzip on;
    gzip_types application/json text/css application/javascript text/html;
    gzip_min_length 1024;
}

# Cloudflare alternative:
#   Just point a DNS record at the host machine's public IP, enable
#   WebSockets in the Cloudflare dashboard (Network panel), and use
#   an origin certificate or Cloudflare's "Full (Strict)" SSL mode.
#   No special proxy config beyond this server block needed.
