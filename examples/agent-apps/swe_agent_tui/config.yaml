# SWE Agent (TUI Mode)
# Inherits tools, sub-agents, and prompts from creatures/swe

name: swe_agent_tui
version: "1.0"
base_config: creatures/swe

controller:
  # --- OpenRouter (API credits) ---
  model: moonshotai/kimi-k2.5
  auth_mode: api-key
  temperature: 1
  max_tokens: 32768
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  tool_format: native
  extra_body: {"reasoning": {"enabled": true}}

  # --- Codex OAuth (ChatGPT subscription) ---
  # model: gpt-5.4
  # auth_mode: codex-oauth
  # reasoning_effort: xhigh
  # service_tier: priority
  # tool_format: native

input:
  type: tui
  prompt: "You: "

output:
  type: tui
  controller_direct: true
