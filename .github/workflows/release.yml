name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: src/kohakuterrarium-frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build output
        shell: bash
        run: |
          test -f src/kohakuterrarium/web_dist/index.html

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Verify built wheel install
        shell: bash
        run: |
          python -m venv .venv-wheel-test
          source .venv-wheel-test/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          kt --help
          kt app --help

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: src/kohakuterrarium-frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build output
        shell: bash
        run: |
          test -f src/kohakuterrarium/web_dist/index.html

      - name: Install briefcase
        run: pip install briefcase

      - name: Pre-build wheels for sdist-only deps
        shell: bash
        run: |
          mkdir -p wheels
          pip wheel proxy_tools -w wheels --no-deps

      - name: Prebuild offline wheel cache for the launcher
        # Topic 06 — the thin-wrapper Briefcase artifact installs the
        # framework into its managed venv on first launch.  The
        # ``wheels-bundle/`` directory carries the kohakuterrarium
        # wheel + transitive deps so first launch works offline.
        shell: bash
        run: |
          pip install build
          python scripts/build_wrapper_wheels.py --from-source --out wheels-bundle

      - name: Create briefcase project
        run: briefcase create

      - name: Build briefcase app
        run: briefcase build

      - name: Verify wheels-bundle is inside the built artifact
        # Topic 06 / 01 — guards the bundled-first first-launch path.
        # Fails if ``wheels-bundle/kohakuterrarium-*.whl`` is missing
        # from the Briefcase build tree.
        shell: bash
        run: |
          python scripts/verify_bundled_wheels.py build/

      - name: Package briefcase app
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macOS" ]; then
            briefcase package --adhoc-sign
          else
            briefcase package
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # Windows: .msi in dist/
          # macOS: .dmg in dist/
          cp dist/*.msi artifacts/ 2>/dev/null || true
          cp dist/*.dmg artifacts/ 2>/dev/null || true
          cp dist/*.zip artifacts/ 2>/dev/null || true
          # Fallback: grab anything briefcase produced
          find dist/ -maxdepth 1 -type f \( -name "*.msi" -o -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.app" \) -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -la artifacts/
          test -n "$(find artifacts -maxdepth 1 -type f | head -n 1)"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: artifacts/

  build-docker:
    needs: [build-wheel]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - target: all
            dockerfile: docker/Dockerfile.all
            suffix: ""
          - target: host
            dockerfile: docker/Dockerfile.host
            suffix: "-host"
          - target: client
            dockerfile: docker/Dockerfile.client
            suffix: "-client"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kohakuterrarium${{ matrix.image.suffix }}"
          version="${GITHUB_REF_NAME#v}"
          {
            echo "repo=${repo}"
            echo "version=${version}"
            echo "tag_version=${repo}:${version}"
            echo "tag_latest=${repo}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_version }}
            ${{ steps.tags.outputs.tag_latest }}
          build-args: |
            WHEEL_GLOB=dist/kohakuterrarium-*.whl

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${{ steps.tags.outputs.repo }}@${DIGEST}"

  publish-pypi:
    needs: [build-wheel]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build-wheel, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect all files
        run: |
          mkdir release
          find all-artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'b') || contains(github.ref, 'rc') }}
