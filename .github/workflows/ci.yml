name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff black
      - run: ruff check src/ tests/
      - run: black --check src/ tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # CI validates 3.12+ only.  ``requires-python`` in pyproject
        # still allows 3.10/3.11 so installs don't break for users
        # on older runtimes, but those Pythons exhibit asyncio +
        # kohakuvault-daemon-thread contention that pushes the
        # integration suite past 180s on hosted runners.  See README
        # "Supported Python versions" for the recommended baseline.
        python-version: ["3.12", "3.13", "3.14"]
        exclude:
          # pythonnet (pywebview Windows backend) has no 3.14 wheel
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Install kt-biome (default package the catalog tests assert is present)
        # Catalog tests assert the package is installed editable
        # (``biome["editable"] is True``), so clone + install with
        # ``-e`` rather than a one-shot git URL install.
        shell: bash
        run: |
          git clone https://github.com/Kohaku-Lab/kt-biome.git "$RUNNER_TEMP/kt-biome"
          kt install "$RUNNER_TEMP/kt-biome" -e
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --ignore=tests/unit/test_file_sizes.py --ignore=tests/unit/test_dep_graph_lint.py
      - name: Run integration tests
        # E2E tests (tests/e2e/) are intentionally NOT run in CI —
        # they spin up real WebSocket-backed lab clusters, subprocess
        # workers, multi-node session mirrors, and Vue-frontend-like
        # HTTP/WS journeys, and the resulting timing depends on
        # hosted-runner network + scheduler behavior that is too
        # volatile to gate every PR on.  Bug anchoring + regression
        # protection come from the unit + integration tiers; e2e is
        # the developer surface for reproducing real user behavior
        # locally (see tests/README.md).
        run: pytest tests/integration/ -v --tb=short

  test-format-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run file size guards
        run: pytest tests/unit/test_file_sizes.py -v --tb=short

  test-dep-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run dep-graph lint guard
        run: pytest tests/unit/test_dep_graph_lint.py -v --tb=short

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/kohakuterrarium-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run format:check
      - run: npm run build
      - name: Verify frontend build output
        working-directory: .
        run: test -f src/kohakuterrarium/web_dist/index.html

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: src/kohakuterrarium-frontend
        run: |
          npm ci
          npm run build
      - name: Verify frontend build output
        run: test -f src/kohakuterrarium/web_dist/index.html
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
      - name: Verify built wheel install
        run: |
          python -m venv .venv-wheel-test
          source .venv-wheel-test/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          kt --help
          kt app --help
